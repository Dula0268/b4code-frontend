name: Frontend CI

on:
  pull_request:
    branches: [ main, develop, dev ]
  push:
    branches: [ main, develop, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watch=false || true

      - name: Build
        run: npm run build
